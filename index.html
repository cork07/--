<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
h1{
font-family:"Yu GOthic","游ゴシック",sans-serif;
}

.container {
  max-width: 600px;
  margin: 0 auto;
}
.search-box{
display:flex;
gap:8px;
}
input{
padding:14px;
width:100%;
font-size:18px;
box-sizing:border-box;
}
button{
padding:14px;
font-size:16px;
color:white;
background-color: #2563eb;
}
</style>
<title>
ヨークスch過去動画検索ツール
</title>  
</head> 

<body>
<div class="container">
<h1>ヨークスch過去動画検索</h1>
<div class="search-box">
<input type="text" id="leader" placeholder="検索したいリーダー">
<button onclick="search()">検索</button>
</div>
<div id="result">対戦動画の検索結果が表示されます</div>
<p>※左側に表示されるリーダーをヨークスが使用します</p>
<p>op16赤エースは、「新赤エース」と検索してください</p>
<p>op15黄ルフィは、「空島ルフィ」と検索してください</p>
</div>
</body>

<script>
const videos = [
{title:"黒黄ティーチvs新赤エース 2026.5.8",
 leader1:"黒黄ティーチ",leader2:"新赤エース",
 url:"https://youtu.be/gwL5HZDaYlQ?si=DGAWPComSJmQ0epb"
},
{title:"黒ヤマトvs新赤エース 2026.5.8",
 leader1:"黒ヤマト",leader2:"新赤エース",
 url:"https://youtu.be/fb4QAiR2rRw?si=OcqnD_K2IBMKgFr1"
},
{title:"紫エネルvs空島ルフィ 2026.5.6",
leader1:"紫エネル",leader2:"空島ルフィ",
 url:"https://youtu.be/rRWVyADW7WM?si=9JIxccdx_RnxL4ag"},
{title:"新赤エースvs紫エネル 2026.5.6",
leader1:"新赤エース",leader2:"紫エネル",
 url:"https://youtu.be/FTmdJq8Ks4E?si=qtbOgwukj90D3Wa7"}
]

function search() {
const keyword = document.getElementById("leader").value;
const result = document.getElementById("result");
result.innerHTML = "";
for (const video of videos){
if (video.leader1 === keyword || video.leader2 === keyword){
result.innerHTML += `
<p>
<a href="${video.url}" target="_blank">
${video.title}
</a>
</p>
`;
}
}
}
</script>






</html>
